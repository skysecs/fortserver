#═══════════════════════════════════════════════════════════════════════════════
# UKey 驱动配置 — Schema v2.0
# 后端将此文件解析后以 JSON 格式响应 /api/v1/authentication/cert/vendor-driver-config/
#═══════════════════════════════════════════════════════════════════════════════

# ── 元信息 ──────────────────────────────────────────────────────────────────────
meta:
  vendor: "{{ '龙脉科技' | trans }}"
  product: "mToken UKey"
  version: "1.0.0"
  description: "{{ '龙脉科技 mToken UKey Web SDK 配置' | trans }}"


# - 配置信息 
config:
  # 非对称密钥的算法
  asymAlg: 
    SM2: 131328
    RSA-1024: 65536
    RSA-2048: 65536
    default: 131328
  # 密钥类型
  keySpec: 1  # 1 表示签名密钥
  # 密钥长度（位）
  keyLength:
    SM2: 256
    RSA-1024: 1024
    RSA-2048: 2048
    default: 256
  digestMethod:
    SM2: 1  # SM3
    RSA-1024: 4 # SHA256
    RSA-2048: 4 # SHA256
    default: 1
  signChallengeMode:
    SM2: 0
    RSA-1024: 1 # SHA256
    RSA-2048: 1 # SHA256
    default: 0
  poll_interval: 5000


#═══════════════════════════════════════════════════════════════════════════════
# sdk: SDK 脚本加载、实例创建、初始化步骤
#
# 变量命名空间:
#   {{ ukey.* }}      — sdk.setup.steps 中通过 register 注册的持久变量
#                       生命周期与驱动实例相同，所有操作均可读取
#   {{ instance.* }}  — SDK 实例对象本身的属性（create 后立即可用）
#                       例如: {{ instance.GM3000PCSC }}
#   {{ vars.* }}      — 操作执行期间各步骤通过 register 注册的临时变量
#                       生命周期仅限当次操作
#   {{ input.* }}     — 当前步骤 input 对话框收集的用户输入
#   {{ user.* }}      — 组件 object prop 中的用户对象字段（如 user.username, user.id）
#   {{ settings.* }}  — 后端 publicSettings 中的全局配置项
#   {{ config.* }}    — 后端响应中 config 段的字段（如 config.enroll.enabled, config.pin.default）
#═══════════════════════════════════════════════════════════════════════════════
sdk:

  # 构造 UKey SDK 实例
  create:
    constructor: "mToken"   # 脚本加载后挂载到 window 的构造函数名
    args: ['mTokenPlugin']                      # 传给构造函数的参数列表

  # 实例创建后执行的初始化步骤（同步，顺序执行）
  # 各厂商按需配置，步骤可多可少，结果通过 register 写入 ukey.* 供后续操作使用
  # 若厂商 SDK 无需初始化步骤，可将 steps 配为空列表或省略整个 setup 块
  setup:
    steps:
      - name: loadLibrary 
        label: "{{ '加载驱动库' | trans }}"
        call: SOF_LoadLibrary
        args: 
          - "{{ instance.GM3000 }}"

      - name: getDevSN
        label: "{{ '获取设备序列号' | trans }}"
        call: SOF_EnumDevice
        args: []
        register: ukey.devSN 
      
      - key: releaseAppInstance
        label: "{{ '释放应用实例' | trans }}"
        call: SOF_ReleaseDeviceInstance
        args:
          - "{{ ukey.devSN.0 }}"

      # 重要：后续 API 内部会用 devName 
      - key: BindAppInstance
        label: "{{ '绑定应用实例' | trans }}"
        call: SOF_GetDeviceInstance
        args:
          - "{{ ukey.devSN.0 }}"
          - "" # 绑定第一个应用

      - name: getDevVersion
        label: "{{ '获取设备版本' | trans }}"
        call: SOF_GetDeviceInfo
        args: 
          - "{{ ukey.devSN.0 }}"
          - "{{ instance.SGD_DEVICE_HARDWARE_VERSION }}"
        scope: both
        register: ukey.devVersion 
      
      - name: getUserCert
        label: "{{ '获取证书' | trans }}"
        call: SOF_ExportUserCert
        args:
          - "{{ settings.VENDOR }}"  # containerName
          - "{{ config.keySpec }}"  # keySpec
        register: ukey.cert

#═══════════════════════════════════════════════════════════════════════════════
# info: 展示信息字段定义（只读，不修改设备状态）
#
# 每个字段取值方式（二选一，call 优先级高于 value）：
#   call + args — 调用 UKey 方法，返回值作为显示内容
#   value       — 直接写固定字符串，或 {{ }} 模板引用变量
#
# check（可选，仅 call 字段有效）：方法调用成功后对返回值做判断，未通过则该字段不显示
#   字符串形式 — 直接写表达式，result 代表方法返回值，例：
#     check: "{{ result != null && result != '' }}"
#   对象形式   — 可附带说明（目前仅用于文档，不影响运行）：
#     check:
#       expr: "{{ result != null }}"
#       message: "方法返回为空"
#
# status（可选）：根据某个变量的值，声明式地映射为带样式的状态标签
#   source   — 取值的模板变量
#   cases    — 匹配规则列表，按顺序匹配，第一个命中的生效
#     match  — truthy（非空/非假）、falsy（空/假/null/undefined），或精确字符串值
#     text   — 显示的文本
#     type   — 标签样式：success | warning | danger | info（对应绿/橙/红/灰）
#
# scope 可选值:
#   both  — 管理员与用户均可见（默认）
#   admin — 仅管理员可见
#   user  — 仅用户可见
#═══════════════════════════════════════════════════════════════════════════════
info:
  when: "{{ mode === 'admin' || (mode === 'user' && ukey.devSN.0 === user.ukey_sn) }}"  # 仅当检测到设备时显示信息区域

  # 左上「设备驱动状态」区域的动态字段（固定字段由页面内置）
  device:

    - key: ukeyConnected
      label: "{{ '设备状态' | trans }}"
      scope: both
      source: "{{ ukey.devSN.0 }}"
      status:
        cases:
          - match: truthy
            text: "{{ '已连接' | trans }}"
            type: success
            value: true
          - match: falsy
            text: "{{ '未连接' | trans }}"
            type: danger
            value: false
      register: ukey.connected

    - key: devVersion
      label: "{{ '设备版本' | trans }}"
      scope: both
      value: "{{ ukey.devVersion }}"

    - key: devSN
      label: "{{ '设备序列号' | trans }}"
      scope: both
      value: "{{ ukey.devSN.0 }}"

    - key: userUKeySN
      label: "{{ '用户绑定的设备序列号' | trans }}"
      scope: both
      value: "{{ user.ukey_sn }}"
      compare: "{{ ukey.devSN.0 }}"
    
  # 右上「证书信息」区域
  #
  # cert 支持两种格式：
  #   数组格式（旧）— 直接列出字段，无整体 when
  #   对象格式（新）— { when?, fields }，先执行 when，条件不满足则显示「暂未签发证书」
  #
  # when 可选，支持两种写法：
  #   字符串（表达式）：
  #     when: "{{ ukey.cert != null && ukey.cert !== '' }}"
  #   对象（call + 可选 expr）：
  #     when:
  #       call: SOF_GetCertCount
  #       args:
  #         - "{{ ukey.devSN }}"
  #       expr: "{{ result > 0 }}"
  cert:
    when: "{{ ukey.cert != null && ukey.cert !== '' }}"
    fields:
      - key: CERT_SUBJECT_CN
        label: "{{ '证书拥有者 CN' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_SUBJECT_CN }}" # OID for Subject CN
        compare: "{{ user.username }}"
        register: ukey.certCN
      
      - key: CERT_SUBJECT_O
        label: "{{ '证书拥有者 O' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_SUBJECT_O }}" # OID for Subject O

      - key: CERT_SUBJECT_OU
        label: "{{ '证书拥有者 OU' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_SUBJECT_OU }}" # OID for Subject OU

      - key: CERT_VERSION
        label: "{{ '证书版本' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_VERSION }}" # OID for Certificate Version

      - key: CERT_SERIAL
        label: "{{ '证书序列号' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_SERIAL }}" # OID for Certificate Serial

      - key: CERT_START_TIME
        label: "{{ '证书开始时间' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_NOT_BEFORE }}" # OID for Start Time

      - key: CERT_END_TIME
        label: "{{ '证书结束时间' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_VALID_TIME }}" # OID for End Time

      - key: CERT_DER_PUBLIC_KEY
        label: "{{ '证书公钥（DER）' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_DER_PUBLIC_KEY }}" # OID for DER Public Key

      - key: CERT_ISSUER_CN
        label: "{{ '证书颁发者 CN' | trans }}"
        call: SOF_GetCertInfo
        args: 
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_ISSUER_CN }}" # OID for Issuer CN

      - key: CERT_ISSUER_O
        label: "{{ '证书颁发者 O' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_ISSUER_O }}" # OID for Issuer O

      - key: CERT_ISSUER_OU
        label: "{{ '证书颁发者 OU' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"  # cert
          - "{{ instance.SGD_CERT_ISSUER_OU }}" # OID for Issuer OU
      

#═══════════════════════════════════════════════════════════════════════════════
# operations: 操作按钮列表（顺序即按钮排列顺序）
#
# 每个操作的顶层字段:
#   key      — 唯一标识符
#   label    — 按钮文字 & 操作名称
#   hint     — 按钮下方的补充说明
#   btnType  — Element UI 按钮类型: primary | success | warning | danger | info
#   scope    — 可见范围: admin | user | both（默认 both）
#   hidden   — 是否隐藏按鈕，支持布尔或 {{ }} 模板（解析为真就隐藏）
#             例如: hidden: "{{ config.enroll.enabled }}" 为 false 时显示按鈕
#   confirm  — 操作前弹出确认框（非步骤级）
#   steps    — 步骤列表（顺序执行）
#
# 步骤字段:
#   name       — 步骤标识（用于日志显示）
#   label      — 步骤名称
#   call       — 调用 UKey 实例的方法名（type 不为 api 时使用）
#   type       — 步骤类型: api（HTTP 请求）或 ukey（默认，UKey 方法调用）
#   args       — 参数列表（支持模板字符串和复杂对象）
#   input      — 步骤执行前弹出输入对话框
#   register   — 将返回值注册到指定命名空间（ukey.* 或 vars.*）
#   on_error   — 错误处理策略: skip（跳过此步骤继续）或默认（中止操作）
#   check      — 校验步骤返回值，失败则中止（除非 on_error: skip）
#                简写形式:  check: "{{ result === 0 }}"
#                完整形式:  check:
#                             expr: "{{ result === 0 }}"
#                             message: "失败，错误码: {{ result }}"
#                result 为步骤实际返回值，可在 expr / message 中使用
#
# 参数复杂对象格式:
#   { type: csv,  value: { key1: tpl, ... } }  →  "key1=val1,key2=val2"
#   { type: json, value: { key1: tpl, ... } }  →  '{"key1":"val1"}'
#═══════════════════════════════════════════════════════════════════════════════
operations:
  when: "{{ mode === 'admin' || (mode === 'user' && ukey.devSN.0 === user.ukey_sn) }}"  # 仅当检测到设备时显示信息区域

  items:
    - key: bindUserUKeySN
      label: "{{ '绑定设备' | trans }}"
      hint: "{{ '为当前用户绑定 UKey 设备的序列号，一个用户仅能绑定一个 UKey，绑定后当前用户只能使用绑定的 UKey 登录' | trans }}"
      btnType: primary
      scope: admin
      event: refresh.info.device
      steps:
        - name: inputUKeySN
          label: "{{ '输入设备序列号' | trans }}"
          input:
            title: "{{ '绑定用户设备序列号' | trans }}"
            fields:
              - key: ukeySN
                label: "{{ '设备序列号' | trans }}"
                type: text
                value: "{{ ukey.devSN.0 }}"
                required: true

        - name: bindUserUKeySN
          label: "{{ '绑定设备' | trans }}"
          type: api
          method: patch
          url: "{{ config.api.user_detail_url }}"
          url_format: 
            user_id: "{{ user.id }}"
          body:
            ukey_sn: "{{ input.ukeySN }}"
          register: user

    - key: unbindUserUKeySN
      label: "{{ '解绑设备' | trans }}"
      hint: "{{ '解绑后用户将无法使用 UKey 登录' | trans }}"
      btnType: danger
      scope: admin
      confirm:
        title: "{{ '解绑设备确认' | trans }}"
        message: "{{ '确认要解绑 UKey 设备吗？' | trans }}"
        type: warning
      event: refresh.info.device
      steps:
        - name: confirmUnbind
          label: "{{ '解绑后用户将无法使用 UKey 登录，确认要解绑吗？' | trans }}"
          type: api
          method: patch
          url: "{{ config.api.user_detail_url }}"
          url_format: 
            user_id: "{{ user.id }}"
          body:
            ukey_sn: ""
          register: user
        
    - key: issueCert
      label: "{{ '签发证书' | trans }}"
      hint: "{{ '为 UKey 生成密钥对并签发数字证书' | trans }}"
      btnType: primary
      scope: admin    
      hidden: "{{ !config.enroll.enabled }}"  # config.enroll.enabled 为 false 时隐藏此按鈕
      disabled: "{{ !ukey.connected }}"
      event: refresh.info.cert
      steps:
        - name: BindAppInstance
          label: "{{ '绑定应用实例' | trans }}"
          call: SOF_GetDeviceInstance
          args:
            - "{{ ukey.devSN.0 }}"
            - "" # 绑定第一个应用

        - name: verifyUKeyUserPIN
          label: "{{ '验证用户 PIN' | trans }}"
          input: 
            title: "{{ '验证用户 PIN' | trans }}"
            fields:
              - key: userPIN
                label: "{{ '用户 PIN' | trans }}"
                type: password
          call: SOF_Login
          args:
            - "{{ input.userPIN }}"
          check:
            expr: "{{ result === 0 }}"
            message: "{{ '用户认证失败，错误码: {{ result }}' | trans }}"

        - name: createContainer 
          label: "{{ '创建容器' | trans }}"
          call: SOF_CreateContainer
          args:
            - '{{ settings.VENDOR }}'

        - name: genKeyPair
          label: "{{ '生成密钥对' | trans }}"
          call: SOF_CreateKeyPair
          args:
            - "{{ settings.VENDOR }}"  # containerName
            - "{{ config.keySpec }}"  # keySpec
            - "{{ config.asymAlg }}" # asymAlg SM2
            - "{{ config.keyLength }}"  # keyLength
          check:
            expr: "{{ result === 0 }}"
            message: "{{ '生成密钥对失败，错误码: {{ result }}' | trans }}"

        - name: genCSR
          label: "{{ '生成证书申请' | trans }}"
          call: SOF_GenerateP10Request
          args:
            - "{{ settings.VENDOR }}"  # containerName
            - type: csv  # dn
              value:
                CN: "{{ user.username }}"
                O: "{{ settings.VENDOR }}"
            - "{{ config.asymAlg }}" # asymAlg SM2
            - "{{ config.keySpec }}"  # keySpec
            - "{{ config.keyLength }}"  # keyLength
          register: vars.csr
          check:
            expr: "{{ result !== null }}"
            message: "{{ '生成证书申请失败，错误码: {{ result }}' | trans }}"

        - name: signCert
          label: "{{ '服务器签发证书' | trans }}"
          type: api
          method: post
          url: "{{ config.api.enroll_cert_url }}"
          body:
            user_id: "{{ user.id }}"
            csr: "{{ vars.csr }}"
          register: vars.certData

        - name: importCert
          label: "{{ '导入证书到设备' | trans }}"
          call: SOF_ImportCert
          args: 
            - "{{ settings.VENDOR }}"  # containerName
            - "{{ vars.certData.signed_cert }}"  # cert base64
            - "{{ config.keySpec }}" # keySpec 签名证书
          check:
            expr: "{{ result === 0 }}"
            message: "{{ '导入证书失败，错误码: {{ result }}' | trans }}"
        
        - name: getUserCert
          label: "{{ '获取证书' | trans }}"
          call: SOF_ExportUserCert
          args:
            - "{{ settings.VENDOR }}"  # containerName
            - "{{ config.keySpec }}"  # keySpec
          register: ukey.cert
          check:
            expr: "{{ result != null && result != '' }}"
            message: "{{ '获取证书失败' | trans }}"

    - key: deleteCert
      label: "{{ '删除证书' | trans }}"
      hint: "{{ '永久删除 UKey 中的数字证书，操作不可逆' | trans }}"
      btnType: danger
      scope: admin
      hidden: "{{ !config.enroll.enabled }}"
      disabled: "{{ !ukey.connected }}"
      event: refresh.info.cert
      confirm:
        title: "{{ '删除证书确认' | trans }}"
        message: "{{ '确认要删除 UKey 中的证书吗？此操作不可逆。' | trans }}"
        type: warning
      steps:
        - name: verifyUKeyUserPIN
          label: "{{ '验证用户 PIN' | trans }}"
          input: 
            title: "{{ '验证用户 PIN' | trans }}"
            fields:
              - key: userPIN
                label: "{{ '用户 PIN' | trans }}"
                type: password
          call: SOF_Login
          args:
            - "{{ input.userPIN }}"
          check:
            expr: "{{ result === 0 }}"
            message: "{{ '用户认证失败，错误码: {{ result }}' | trans }}"

        - name: getCertSN
          label: "{{ '获取证书序列号' | trans }}"
          call: SOF_GetCertInfo
          args:
            - "{{ ukey.cert }}"  # cert
            - "{{ instance.SGD_CERT_SERIAL }}" # OID for Certificate Serial
          register: vars.certSN

        - name: deleteContainer
          label: "{{ '删除证书所在容器' | trans }}"
          call: SOF_DeleteContainer
          args:
            - "{{ vars.certSN }}"  # cert

        - name: deleteCert
          label: "{{ '删除设备证书' | trans }}"
          call: SOF_DeleteCert
          args: 
            - "{{ vars.certSN }}"  # cert
        
        - name: getUserCert
          label: "{{ '获取证书' | trans }}"
          call: SOF_ExportUserCert
          args:
            - "{{ settings.VENDOR }}"  # containerName
            - "{{ config.keySpec }}"  # keySpec
          register: ukey.cert

    - key: resetPin
      label: "{{ '重置 PIN' | trans }}"
      hint: "{{ '使用管理员权限将 PIN 码重置为系统默认值' | trans }}"
      btnType: warning
      disabled: "{{ !ukey.connected }}"
      scope: admin
      steps:
        - name: resetPin
          label: "{{ '重置 PIN' | trans }}"
          input:
            title: "{{ '验证管理员 PIN' | trans }}"
            fields:
              - key: adminPIN
                label: "{{ '管理员 PIN' | trans }}"
                type: password
          call: SOF_UnblockUserPin
          args:
            - "{{ input.adminPIN }}"
            - "{{ config.pin.default }}"
          check:
            expr: "{{ result === 0 }}"
            message: "{{ '验证管理员 PIN 失败，错误码: {{ result }}' | trans }}"
      
    - key: changePin
      label: "{{ '修改 PIN' | trans }}"
      hint: "{{ '修改 UKey 的用户 PIN 码' | trans }}"
      btnType: info
      scope: both
      disabled: "{{ !ukey.connected }}"
      steps:
        - name: changePin
          label: "{{ '修改 PIN' | trans }}"
          input:
            title: "{{ '修改用户 PIN' | trans }}"
            fields:
              - key: oldPIN
                label: "{{ '旧 PIN' | trans }}"
                type: password
              - key: newPIN
                label: "{{ '新 PIN' | trans }}"
                type: password
                validate:
                  minLength: 4
                  maxLength: 32
                  message: "{{ 'PIN 码长度必须在 4-32 位之间' | trans }}"
              - key: newPIN2
                label: "{{ '确认 PIN' | trans }}"
                type: password
                validate:
                  equals: newPIN              # 必须与 newPIN 字段值相同
                  message: "{{ '两次输入的 PIN 码不一致' | trans }}"
          call: SOF_ChangePassWd
          args:
            - "{{ input.oldPIN }}"
            - "{{ input.newPIN }}"
          check:
            expr: "{{ result === 0 }}"
            message: "{{ '修改 PIN 失败，错误码: {{ result }}' | trans }}"


#═══════════════════════════════════════════════════════════════════════════════
# login: 登录页面流程配置
#
# detect.steps  — 轮询检测设备插入状态（步骤失败视为未插入）
#   步骤执行成功后 ukey.certCN 应被注册，用于自动填充用户名输入框
#
# steps         — 点击「登录」后顺序执行的步骤
#   支持与 operations 相同的步骤字段（call / args / input / register / check）
#   特殊 type: submit — 填充表单字段并提交（字段名对应 id_<name> 输入框）
#
# 登录流程可用命名空间:
#   {{ input.pin }}     — 用户在 PIN 输入框中填写的值
#   {{ ukey.cert }}     — detect.steps 中注册的证书（供 submit 步骤引用）
#   {{ vars.* }}        — 步骤间临时变量（每次登录重置）
#   {{ challenge }}     — 服务端下发的挑战码
#═══════════════════════════════════════════════════════════════════════════════
login:

  # 轮询检测设备 — 步骤失败则视为设备未插入
  detect:
    steps:
      - name: getUserCert
        label: "{{ '获取证书' | trans }}"
        call: SOF_ExportUserCert
        args:
          - "{{ settings.VENDOR }}"  # containerName
          - "{{ config.keySpec }}"   # keySpec
        register: ukey.cert
        check:
          expr: "{{ result != null && result !== '' }}"
          message: "{{ '未检测到证书' | trans }}"

      - name: getCertCN
        when: "{{ ukey.cert != null && ukey.cert !== '' }}"
        label: "{{ '获取证书 CN' | trans }}"
        call: SOF_GetCertInfo
        args:
          - "{{ ukey.cert }}"
          - "{{ instance.SGD_CERT_SUBJECT_CN }}"
        register: ukey.certCN
        check:
          expr: "{{ result != null && result !== '' }}"
          message: "{{ '获取证书 CN 失败' | trans }}"

  # 登录步骤
  steps:
    - name: verifyPin
      label: "{{ '验证 PIN' | trans }}"
      call: SOF_Login       # TODO: 确认厂商 SDK 的验证 PIN 方法名
      args:
        - "{{ input.pin }}"
      check:
        expr: "{{ result === 0 }}"
        message: "{{ 'PIN 验证失败，错误码: {{ result }}' | trans }}"
    
    - name: setDigestMethod
      label: "{{ '设置摘要算法' | trans }}"
      call: SOF_SetDigestMethod
      args:
        - "{{ config.digestMethod }}"
      check:
        expr: "{{ result === 0 }}"
        message: "{{ '设置摘要算法失败，错误码: {{ result }}' | trans }}"
    
    - name: setUserID
      label: "{{ '设置用户 ID' | trans }}"
      call: SOF_SetUserID
      args:
        - "1234567812345678"
      check:
        expr: "{{ result === 0 }}"
        message: "{{ '设置用户 ID 失败，错误码: {{ result }}' | trans }}"
    
    - name: signChallenge
      label: "{{ '签名挑战码' | trans }}"
      call: SOF_SignData             # TODO: 确认厂商 SDK 的签名方法名
      args:
        - "{{ settings.VENDOR }}"
        - "{{ config.keySpec }}"
        - "{{ challenge.code_base64 }}"
        - "{{ challenge.length }}"
        - "{{ config.signChallengeMode }}"
      register: vars.signature
      check:
        expr: "{{ vars.signature !== null && vars.signature !== '' }}"
        message: "{{ '签名失败' | trans }}"

    - name: submit
      label: "{{ '提交登录' | trans }}"
      type: submit
      fields:
        signature: "{{ vars.signature }}"
        cert: "{{ ukey.cert }}"
        username: "{{ ukey.certCN }}"  # 自动填充用户名输入框
        ukey_sn: "{{ ukey.devSN.0 }}"


