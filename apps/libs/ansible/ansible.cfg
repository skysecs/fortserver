[defaults]
forks             = 20
host_key_checking = False
library           = /opt/fortserver/apps/libs/ansible/modules:./modules
timeout           = 65
[inventory]
[privilege_escalation]
[paramiko_connection]
[ssh_connection]
# for test
ssh_args = -o ControlMaster=no -o ControlPersist=no
pipelining = True

[persistent_connection]
[accelerate]
[selinux]
[colors]
[diff]
